<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Pictures</title>

<style>

/* Page styling */
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-color:#f4f4f4;
}

/* Gallery container */
.gallery{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

/* Each photo card */
.photo{
    flex:1 1 250px;
    overflow:hidden;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    background:white;
}

/* Image styling */
.photo img{
    width:100%;
    height:200px;
    object-fit:cover;
    transition:transform 0.3s ease;
}

/* Hover effect */
.photo img:hover{
    transform:scale(1.05);
}

</style>

</head>

<body>

<h1 style="text-align:center;">My Picture Gallery</h1>

<div class="gallery">

<div class="photo">
<img src="image (1).jpg" alt="Photo 1">
</div>

<div class="photo">
<img src="image (2).jpg" alt="Photo 2">
</div>

<div class="photo">
<img src="image (3).jpg" alt="Photo 3">
</div>

<div class="photo">
<img src="image (4).jpg" alt="Photo 4">
</div>

<div class="photo">
<img src="image (5).jpg" alt="Photo 5">
</div>

<div class="photo">
<img src="image (6).jpg" alt="Photo 6">
</div>

<div class="photo">
<img src="image (7).jpg" alt="Photo 7">
</div>

<div class="photo">
<img src="image (8).jpg" alt="Photo 8">
</div>

</div>

</body>
</html>
